<!DOCTYPE html>
<html lang="ru">
<head>
		<meta charset="UTF-8">
		<title>Оформление вертикального меню</title>
		<style>
			html {
				background: #f0f0f0;
			}
			
			.menu {
				width: 200px;
				background: #fff;
			}
			
			.menu ul {
				list-style: none;
				margin: 0;        
                padding: 0px; 
			}
			.menu ul li{
				margin: 0;
				padding: 0;
			}

			.menu li {
                cursor: pointer;
                margin-left: 0px;

			}
           .menu-link {
                display: flex;
                align-items: center;
                
                color: #369;
                line-height: 36px;
            }

            
            .menu-link::before {
                content: "";
                display: inline-block;
                width: 36px;
                height: 36px;
                background-image: url('css_sprites.png'); 
				vertical-align: middle;
                flex-shrink: 0;
            }

            
            .icon-films::before {
                background-position: 0 0; 
            }

            .icon-music::before {
                background-position: 0 -36px ; 
            }

            .icon-soft::before {
                background-position: 0 -72px;
            }
                        

            .menu-link:hover {
                background-color: #ffffcc;
            }
			
			.menu li a {
				display: block;            
                padding: 2px;            
                text-transform:capitalize ; 
                text-decoration: none;     
                background: #fff;          
                color: #369; 
                text-decoration: underline;  
			}
            
			.menu li a:hover {
				background: #ffffcc;      
                color: #000; 
			}
			
			.menu li ul {
				list-style: none;
                padding-left: 65px;
				margin: 0;
			}
			
			.menu li li{
				list-style-image: url('point.gif');
				line-height: 24px;
			}
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li>
                <a href="#" class="menu-link icon-films">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li>
                <a href="#" class="menu-link icon-music">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li>
                <a href="#" class="menu-link icon-films">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li>
                <a href="#" class="menu-link icon-films">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
