<!DOCTYPE html>
<html lang="ru">
<head>
		<meta charset="UTF-8">
		<title>Оформление вертикального меню</title>
		<style>
        html {
			background: #f0f0f0;
		}
			
		.menu {
				width: 200px;
				background: #fff;
                    
		}
			
		.menu ul {
            list-style: none;
			margin: 0;        
            padding-left: 20px;  
            list-style-image: url('minus.gif');   
            margin-left: 15px;
		}
        .menu li:hover ul {
            display: block;
        }

		.menu li a {
			display: block;            
            padding: 2px;            
            text-transform:capitalize ; 
            text-decoration: none;     
            background: #fff;          
            color: #369; 
            text-decoration: underline;    
		}
			
		.menu li a:hover {
			background: #ffffcc;      
            color: #000;      
		}
			
		.menu li ul {
            display: none;
            position: relative;
            top: 0;
            width: 150px;
			list-style: none;
            padding-left: 20px  
			}
			
		.menu li li {
			list-style-image: url('point.gif'); 
		}
	</style>
</head>
